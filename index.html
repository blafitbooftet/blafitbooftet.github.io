<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="utf-8">

<title>加载中...</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Microsoft YaHei",sans-serif;
background:#f5f5f5;
padding:50px 20px;
}

.box{

max-width:1000px;
margin:auto;

background:#fff;

padding:50px;

border-radius:12px;

box-shadow:0 0 20px rgba(0,0,0,.08);

text-align:center;

}

h1{

font-size:48px;

color:#0066cc;

margin-bottom:30px;

}

.desc{

font-size:22px;

color:#333;

margin-bottom:40px;

}

.btn{

display:inline-block;

padding:18px 60px;

background:#ff6600;

color:#fff;

font-size:24px;

text-decoration:none;

border-radius:8px;

transition:.3s;

}

.btn:hover{

background:#ff4d00;

}

ul{

list-style:none;

margin-top:50px;

padding:0;

}

li{

font-size:22px;

line-height:50px;

color:#333;

}

.footer{

margin-top:40px;

color:#999;

font-size:14px;

}

</style>

</head>

<body>

<div class="box">

<h1 id="keyword">加载中...</h1>

<div class="desc" id="desc">
加载中...
</div>

<a
id="btn"
class="btn"
href="#"
target="_blank"
>
点击进入
</a>

<ul id="tails"></ul>

<div class="footer">

Powered by GitHub Pages

</div>

</div>

<script>

fetch(
'https://raw.githubusercontent.com/blafitbooftet/seo-data/refs/heads/main/keywords.json'
)

.then(response => response.json())

.then(data => {

document.title = data.title;

document.getElementById('keyword').innerHTML = data.keyword;

document.getElementById('desc').innerHTML = data.description;

document.getElementById('btn').innerHTML = data.button;

document.getElementById('btn').href = data.link;

let html='';

data.tails.forEach(item=>{

html += `<li>${item}</li>`;

});

document.getElementById('tails').innerHTML = html;

})

.catch(error=>{

console.log(error);

document.getElementById('keyword').innerHTML='读取失败';

});

</script>

</body>

</html>
