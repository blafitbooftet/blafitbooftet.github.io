<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>加载中...</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Microsoft YaHei";
background:#f5f5f5;
}

.top{
height:60px;
background:#2196f3;
color:#fff;
display:flex;
align-items:center;
padding:0 30px;
font-size:22px;
font-weight:bold;
}

.container{
width:1200px;
margin:20px auto;
}

.appbox{
background:#fff;
padding:30px;
display:flex;
border-radius:10px;
}

.icon{
width:150px;
height:150px;
border-radius:20px;
object-fit:cover;
}

.info{
margin-left:30px;
flex:1;
}

.title{
font-size:36px;
font-weight:bold;
margin-bottom:15px;
}

.meta{
line-height:40px;
font-size:18px;
color:#666;
}

.download{
display:inline-block;
margin-top:20px;
background:#1abc9c;
color:#fff;
padding:15px 50px;
text-decoration:none;
border-radius:8px;
font-size:22px;
}

.section{
background:#fff;
margin-top:20px;
padding:30px;
border-radius:10px;
}

.section h2{
margin-bottom:20px;
color:#2196f3;
}

.keyword{
display:inline-block;
padding:10px 20px;
background:#f2f2f2;
margin:10px;
border-radius:20px;
}

.related{
display:inline-block;
padding:12px 25px;
background:#2196f3;
color:#fff;
margin:10px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="top">
安卓软件下载中心
</div>

<div class="container">

<div class="appbox">

<img id="icon" class="icon">

<div class="info">

<div id="title" class="title"></div>

<div class="meta">
版本：<span id="version"></span><br>
大小：<span id="size"></span><br>
更新：<span id="update"></span><br>
语言：<span id="language"></span><br>
系统：<span id="system"></span>
</div>

<a id="download" class="download" target="_blank">
立即下载
</a>

</div>

</div>

<div class="section">

<h2>软件介绍</h2>

<p id="description"></p>

</div>

<div class="section">

<h2>热门关键词</h2>

<div id="tails"></div>

</div>

<div class="section">

<h2>相关推荐</h2>

<div id="related"></div>

</div>

</div>

<script>

fetch('https://raw.githubusercontent.com/blafitbooftet/seo-data/refs/heads/main/keywords.json')

.then(r=>r.json())

.then(data=>{

document.title=data.title;

document.getElementById('title').innerHTML=data.keyword;

document.getElementById('version').innerHTML=data.version;

document.getElementById('size').innerHTML=data.size;

document.getElementById('update').innerHTML=data.update;

document.getElementById('language').innerHTML=data.language;

document.getElementById('system').innerHTML=data.system;

document.getElementById('description').innerHTML=data.description;

document.getElementById('download').href=data.link;

document.getElementById('icon').src=data.icon;

let tails='';

data.tails.forEach(i=>{
tails+=`<span class="keyword">${i}</span>`;
});

document.getElementById('tails').innerHTML=tails;

let related='';

data.related.forEach(i=>{
related+=`<span class="related">${i}</span>`;
});

document.getElementById('related').innerHTML=related;

});

</script>

</body>
</html>
