<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>加载中...</title>

<style>

body{
    font-family: Arial;
    background:#f5f5f5;
    text-align:center;
    padding:50px;
}

.box{
    background:#fff;
    width:800px;
    margin:auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px #ddd;
}

h1{
    color:#0066cc;
}

.btn{
    display:inline-block;
    padding:15px 40px;
    background:#ff6600;
    color:#fff;
    text-decoration:none;
    border-radius:5px;
    margin-top:20px;
}

</style>

</head>

<body>

<div class="box">

<h1 id="keyword">加载中...</h1>

<p id="desc"></p>

<a id="btn" class="btn" href="#">点击进入</a>

<ul id="tails"></ul>

</div>

<script>

fetch('https://raw.githubusercontent.com/blafitbooftet/seo-data/refs/heads/main/keywords.json')

.then(res=>res.json())

.then(data=>{

document.title=data.title;

document.getElementById("keyword").innerHTML=data.keyword;

document.getElementById("desc").innerHTML=data.description;

document.getElementById("btn").href=data.link;

document.getElementById("btn").innerHTML=data.button;

let html='';

data.tails.forEach(item=>{

html += '<li>'+item+'</li>';

});

document.getElementById("tails").innerHTML=html;

});

</script>

</body>
</html>
