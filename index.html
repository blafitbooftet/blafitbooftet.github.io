<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>V7 SEO 下载站</title>
<meta id="meta_desc" name="description">
<meta id="meta_keywords" name="keywords">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei";background:#f5f7fb;color:#333}
.top{background:#2196f3;color:#fff;padding:12px 0}
.wrap{width:1200px;margin:auto}
.nav a{color:#fff;margin-right:20px;text-decoration:none}
.breadcrumb,.card,.section{background:#fff;border-radius:10px}
.breadcrumb{padding:12px 20px;margin:20px 0}
.main{display:grid;grid-template-columns:1fr 320px;gap:20px}
.card{padding:25px}
.apphead{display:flex;gap:20px}
.icon{width:140px;height:140px;border-radius:20px;object-fit:cover}
.title{font-size:36px;font-weight:bold;margin-bottom:10px}
.meta{line-height:2}
.btn{display:inline-block;background:#00b894;color:#fff;padding:14px 40px;border-radius:8px;text-decoration:none;margin-top:15px}
.side .card{margin-bottom:20px}
.section{padding:25px;margin-top:20px}
.section h2{margin-bottom:15px;color:#2196f3}
#screens img{width:260px;margin-right:10px;border-radius:10px}
.tag{display:inline-block;background:#eef2f7;padding:8px 14px;border-radius:20px;margin:5px}
</style>
</head>
<body>
<div class="top"><div class="wrap nav"><a href="/">首页</a><a href="#">安卓下载</a><a href="#">排行榜</a></div></div>
<div class="wrap">
<div class="breadcrumb">首页 > 安卓下载 > <span id="keyword2"></span></div>

<div class="main">
<div>
<div class="card">
<div class="apphead">
<img id="icon" class="icon">
<div>
<div id="title" class="title"></div>
<div class="meta">
版本：<span id="version"></span><br>
大小：<span id="size"></span><br>
更新：<span id="update"></span><br>
下载：<span id="downloads"></span>
</div>
<a id="download" class="btn" target="_blank">立即下载</a>
</div>
</div>
</div>

<div class="section"><h2>软件截图</h2><div id="screens"></div></div>
<div class="section"><h2>软件介绍</h2><div id="description"></div></div>
<div class="section"><h2>详细内容</h2><div id="content"></div></div>
</div>

<div class="side">
<div class="card"><h3>评分</h3><div id="score" style="font-size:48px;color:#ff9800">5.0</div></div>
<div class="card"><h3>热门关键词</h3><div id="tails"></div></div>
<div class="card"><h3>相关推荐</h3><div id="related"></div></div>
</div>
</div>
</div>

<script>
const params=new URLSearchParams(location.search);
const currentId=params.get('id')||'heiliao';

fetch(`data/${currentId}.json`)
.then(r=>r.json())
.then(d=>{

document.title=d.title||d.keyword;
document.getElementById('keyword2').innerHTML=d.keyword||'';
document.getElementById('title').innerHTML=d.keyword||'';
document.getElementById('version').innerHTML=d.version||'';
document.getElementById('size').innerHTML=d.size||'';
document.getElementById('update').innerHTML=d.update||'';
document.getElementById('downloads').innerHTML=d.downloads||'';
document.getElementById('score').innerHTML=d.score||'';
document.getElementById('description').innerHTML=d.description||'';
document.getElementById('content').innerHTML=d.content||'';
document.getElementById('download').href=d.link||'#';
document.getElementById('icon').src=d.icon||'https://picsum.photos/300';

document.getElementById('screens').innerHTML=(d.screens||[]).map(i=>`<img src="${i}">`).join('');
document.getElementById('tails').innerHTML=(d.tails||[]).map(i=>`<span class="tag">${i}</span>`).join('');
document.getElementById('related').innerHTML=(d.related||[]).map(i=>`<span class="tag">${i}</span>`).join('');

})
.catch(()=>{
document.body.innerHTML='<h1 style="text-align:center;margin-top:100px">页面不存在</h1>';
});
</script>
</body>
</html>
